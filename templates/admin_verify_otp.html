<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -50px;
            right: -50px;
            animation: float 6s ease-in-out infinite;
        }
        
        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .verify-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .verify-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .verify-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .verify-header h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 700;
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .verify-header p {
            font-size: 1rem;
            opacity: 0.95;
            position: relative;
            z-index: 2;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        
        .verify-body {
            padding: 40px;
            background: white;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: white;
        }
        
        input:focus + i {
            color: #764ba2;
        }
        
        .btn-verify {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-verify::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-verify:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-verify:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: linear-gradient(135deg, #feb2b2 0%, #fc8181 100%);
            color: #c53030;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 500;
            border-left: 4px solid #c53030;
            animation: shake 0.5s ease;
        }
        
        .warning-message {
            background: linear-gradient(135deg, #fef3c0 0%, #fde68a 100%);
            color: #92400e;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 500;
            border-left: 4px solid #f59e0b;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .back-link {
            text-align: center;
            margin-top: 25px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-link a:hover {
            color: #764ba2;
            transform: translateX(-5px);
        }
        
        .back-link i {
            font-size: 0.9rem;
        }
        
        .otp-info {
            background: #ebf4ff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px dashed #667eea;
        }
        
        .otp-info p {
            color: #4a5568;
            font-size: 0.9rem;
        }
        
        .otp-info i {
            color: #667eea;
            margin-right: 8px;
        }
        
        input::placeholder {
            color: #a0aec0;
            font-size: 0.95rem;
            letter-spacing: normal;
            font-weight: normal;
        }
        
        @media (max-width: 480px) {
            .verify-body {
                padding: 30px 20px;
            }
            
            .verify-header {
                padding: 30px 20px;
            }
            
            .verify-header h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="verify-card">
        <div class="verify-header">
            <h2>🔐 Verify OTP</h2>
            <p>Enter the 6-digit code sent to your email</p>
        </div>
        
        <div class="verify-body">
            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i>
                {{ error }}
            </div>
            {% endif %}
            
            {% if warning %}
            <div class="warning-message">
                <i class="fas fa-exclamation-triangle" style="margin-right: 8px;"></i>
                {{ warning }}
            </div>
            {% endif %}
            
            <div class="otp-info">
                <i class="fas fa-info-circle"></i>
                <p>OTP has been sent to your registered email address. It expires in 5 minutes.</p>
            </div>
            
            <form method="POST" action="/admin/verify-otp">
                <div class="form-group">
                    <label><i class="fas fa-key" style="margin-right: 6px;"></i> Enter OTP</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="text" name="otp" placeholder="6-digit code" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="off" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-verify">
                    <i class="fas fa-check-circle" style="margin-right: 8px;"></i>
                    Verify & Login
                </button>
            </form>
            
            <div class="back-link">
                <a href="/admin">
                    <i class="fas fa-arrow-left"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
