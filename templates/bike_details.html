<!DOCTYPE html>
<html lang="en">

<head>
    <title>Two Wheeler Insurance | Jayam AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
</head>

<body>
    {% include 'header.html' %}

    <div class="form-container">
        <h2>Two Wheeler Information</h2>

        <form action="{{ url_for('suggest_policy') }}" method="POST">
            <input type="hidden" name="type" value="Motor">
            <input type="hidden" name="vehicle_type" value="Bike">

            <div class="form-grid">
                <!-- Personal Details -->
                <div class="section-title">Personal Details</div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="customer_name" placeholder="Enter Name" required>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="customer_age" placeholder="Enter Age" required>
                </div>

                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" name="customer_email" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" name="customer_mobile" placeholder="10 Digit Number" required>
                </div>
                <div class="section-title">Financial Details</div>
                <div class="form-group">
                    <label>Annual Income (Lakhs)</label>
                    <input type="number" name="income" placeholder="Eg. 5" min="1" required>
                </div>

                <div class="form-group">
                    <label>Preferred Budget</label>
                    <select name="budget">
                        <option value="Economy">Economy (Basic Cover)</option>
                        <option value="Standard" selected>Standard (Balanced)</option>
                        <option value="Premium">Premium (Max Cover)</option>
                    </select>
                </div>

                <!-- Vehicle Details -->
                <div class="section-title">Vehicle Details</div>
                <div class="form-group">
                    <label>Registration Number</label>
                    <input type="text" name="reg_number" placeholder="TN-01-AB-1234" required>
                </div>

                <div class="form-group">
                    <label>Registration Year</label>
                    <select name="vehicle_age">
                        <option value="0">2025</option>
                        <option value="1">2024</option>
                        <option value="2">2023</option>
                        <option value="3">2022</option>
                        <option value="4">2021</option>
                        <option value="5">2020</option>
                        <option value="6">Before 2020</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Make & Model</label>
                    <input type="text" name="model" placeholder="Eg. Honda Activa 6G" required>
                </div>

                <div class="form-group">
                    <label>Cubic Capacity (CC)</label>
                    <input type="number" name="cc" placeholder="Eg. 110" required>
                </div>

                <div class="form-group">
                    <label>Previous Policy Type</label>
                    <select name="prev_policy">
                        <option>Comprehensive</option>
                        <option>Third Party Only</option>
                        <option>Expired > 90 Days</option>
                        <option>New Vehicle</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Any Claims Last Year?</label>
                    <select name="claim">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
            </div>
            
            <button type="submit">View Bike Insurance Quotes</button>
        </form>
        <div class="note">
                * All information is kept confidential and secure.
            </div>
    </div>
    {% include 'footer.html' %}
</body>

</html>
