<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry - Jayam Associates</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
                * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(to right, #0f1635, #1c2354);
            min-height: 100vh;
            padding: 100px 20px 40px 20px;
        }
        
        .enquiry-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .content {
            padding: 40px;
        }
        
        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
        
        .form-group {
            margin-bottom: 5px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            color: #333;  /* 👈 Dark text color */
        }
        
        input::placeholder, 
        textarea::placeholder {
            color: #999;  /* 👈 Light gray placeholder */
            font-weight: normal;
        }
        
        select {
            color: #333;
            background: #f8f9fa;
        }
        
        select option {
            color: #333;
            background: white;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
            color: #333;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* Popup Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .modal-icon {
            font-size: 4rem;
            color: #28a745;
            margin-bottom: 15px;
        }
        
        .modal h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        
        .modal p {
            color: #666;
            margin-bottom: 20px;
        }
        
        .modal-btn {
            background: linear-gradient(to right, #0f1635, #1c2354);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .modal-btn:hover {
            transform: translateY(-2px);
        }
        
        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 80px 15px 30px 15px;
            }
            
            .content {
                padding: 25px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    {% include 'header.html' %}
    <br><br>
    <div class="enquiry-container">
        <center><div class="content">
            <h2>Send Enquiry</h2></center>
            
            <form id="enquiryForm" method="POST">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Name</label>
                        <input type="text" name="name" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Mobile Number</label>
                        <input type="tel" name="phone" placeholder="e.g., 9876543210" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Insurance Type</label>
                        <select name="service" id="insuranceType" required>
                            <option value="">-- Select --</option>
                            <option value="Health">Health Insurance</option>
                            <option value="Life">Life Insurance</option>
                            <option value="Motor">Motor Insurance</option>
                            <option value="Corporate">Corporate Insurance</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width" id="vehicleField" style="display: none;">
                        <label>Vehicle Type (if Motor)</label>
                        <select name="vehicle_type">
                            <option value="">-- Select --</option>
                            <option value="Bike">Bike</option>
                            <option value="Car">Car</option>
                            <option value="GCV">Goods Carrier (GCV)</option>
                            <option value="PCV">Passenger Carrier (PCV)</option>
                            <option value="Misc">Miscellaneous</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Your Message (Optional)</label>
                        <textarea name="message" rows="4" placeholder="Type your enquiry here..."></textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">Submit Enquiry</button>
                <div class="loader" id="loader">⏳ Sending...</div>
            </form>
        </div>
    </div>
    
    <!-- Popup Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <h3>Submitted Successfully!</h3>
            <p>Your enquiry has been sent to our team. We'll contact you shortly.</p>
            <button class="modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>
    
    <script>
        // Show/hide vehicle field based on insurance type
        function toggleVehicleField() {
            var insuranceType = document.getElementById('insuranceType').value;
            var vehicleField = document.getElementById('vehicleField');
            
            if (insuranceType === 'Motor') {
                vehicleField.style.display = 'block';
            } else {
                vehicleField.style.display = 'none';
            }
        }
        
        document.getElementById('insuranceType').addEventListener('change', toggleVehicleField);
        
        // Handle form submission with AJAX
        document.getElementById('enquiryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var form = this;
            var formData = new FormData(form);
            var loader = document.getElementById('loader');
            var submitBtn = document.getElementById('submitBtn');
            
            // Show loader, disable button
            loader.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.7';
            
            fetch('{{ url_for("enquiry") }}', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                // Hide loader
                loader.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                
                if (data.success) {
                    // Show success popup
                    document.getElementById('successModal').style.display = 'flex';
                    // Reset form
                    form.reset();
                    document.getElementById('vehicleField').style.display = 'none';
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                loader.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                alert('Something went wrong. Please try again.');
            });
        });
        
        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }
    </script>
    {% include 'footer.html' %}
</body>
</html>
