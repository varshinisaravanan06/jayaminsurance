<header class="main-header">
    <div class="navbar">
        <a href="{{ url_for('home') }}" class="logo">
            JAYAM ASSOCIATES
        </a>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('services') }}">Services</a>
            <a href="{{ url_for('partners') }}">Partners</a>
            {% if session.get('user') %}
            <a href="{{ url_for('logout') }}" class="text-gradient" style="font-weight: 600;">{{ session['user'] }}
                (Logout)</a>
            {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            {% endif %}
            <a href="{{ url_for('enquiry') }}" class="btn btn-primary">Get Quote</a>
        </div>
    </div>
</header>
