<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Insurance Details - Jayam Associates</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'header.html' %}
    <br><br>
    <div class="health-form-container" style="max-width: 900px; margin-top: 100px;">
        <div class="content">
            <center>
            <h2>Life Insurance Details</h2>
            </center>
            <form action="{{ url_for('suggest_policy') }}" method="POST">
                <input type="hidden" name="type" value="Life">
                
                <div class="form-grid">
                <!-- Personal Details -->
                <div class="section-title">Personal Details</div>

                    <div class="form-group full-width">
                        <label>Full Name</label>
                        <input type="text" name="customer_name" placeholder="Enter Full Name" required>
                    </div>

                    <div class="form-group">
                        <label>Email ID</label>
                        <input type="email" name="customer_email" placeholder="email@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" name="customer_mobile" placeholder="10 Digit Number" required>
                    </div>
                
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" name="age" placeholder="e.g., 35" required min="18" max="100">
                    </div>
                    
                    <div class="form-group">
                        <label>Annual Income (₹)</label>
                        <input type="number" name="income" placeholder="e.g., 500000" required min="0">
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Gender</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" name="gender" id="male" value="Male" checked>
                                <label for="male">Male</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="gender" id="female" value="Female">
                                <label for="female">Female</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="gender" id="other" value="Other">
                                <label for="other">Other</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Smoking Status</label>
                        <select name="smoking_status" required>
                            <option value="">Select Status</option>
                            <option value="Non-Smoker">Non-Smoker</option>
                            <option value="Smoker">Smoker</option>
                            <option value="Occasional">Occasional</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Preferred Budget</label>
                        <select name="budget" required>
                            <option value="">Select Budget</option>
                            <option value="Economy">Economy</option>
                            <option value="Standard" selected>Standard</option>
                            <option value="Premium">Premium</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Coverage Amount (₹)</label>
                        <select name="cover" required>
                            <option value="">Select Coverage</option>
                            <option value="5000000">50 Lakhs</option>
                            <option value="10000000">1 Crore</option>
                            <option value="20000000">2 Crore</option>
                            <option value="50000000">5 Crore</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Additional Riders</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" name="rider" id="critical" value="Critical Illness">
                                <label for="critical">Critical Illness</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" name="rider" id="accident" value="Accident">
                                <label for="accident">Accidental Death</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" name="rider" id="waiver" value="Waiver">
                                <label for="waiver">Premium Waiver</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" name="rider" id="income" value="Income">
                                <label for="income">Income Benefit</label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">GET RECOMMENDATIONS</button>
            </form>
            
            <div class="note">
                * All information is kept confidential and secure.
            </div>
        </div>
    </div>
    {% include 'footer.html' %}
</body>
</html>
