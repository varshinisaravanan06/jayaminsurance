<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Jayam InsurEase</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <div class="login-container">
        <!-- Floating Logo Icon -->
        <div
            style="margin: 0 auto 20px; width: 60px; height: 60px; background: linear-gradient(135deg, rgba(79, 70, 229, 0.2), rgba(16, 185, 129, 0.1)); border-radius: 16px; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.05);">
            <i class="fas fa-shield-alt" style="font-size: 1.8rem; color: #6366f1;"></i>
        </div>

        <h2>Welcome to JAYAM ASSOCIATES 👋</h2>

        <form method="POST">
            <div style="position: relative;">
                <i class="fas fa-user"
                    style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #64748b;"></i>
                <input type="text" name="name" placeholder="Your Name" required style="padding-left: 45px;">
            </div>
            <div style="position: relative; margin-top: 15px;">
                <i class="fas fa-envelope"
                    style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #64748b;"></i>
                <input type="email" name="email" placeholder="Email Address" required style="padding-left: 45px;">
            </div>
            <button type="submit">Send OTP <i class="fas fa-arrow-right"
                    style="margin-left: 8px; font-size: 0.9em;"></i></button>
        </form>

        <div class="footer-text">
            Jayam InsurEase &copy; 2026
            <br><br>
            <a href="{{ url_for('admin_panel_login') }}"><i class="fas fa-lock"
                    style="margin-right: 5px; font-size: 0.8em;"></i> Admin Login</a>
        </div>
    </div>

</body>

</html>
