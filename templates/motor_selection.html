<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Vehicle Type | Jayam Motor Insurance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    {% include 'header.html' %}

    <div class="form-section" style="padding-top: 150px; min-height: 80vh; flex-direction: column;">
        <div class="container" style="text-align: center;">
            <h1 class="text-gradient" style="font-size: 2.5rem; margin-bottom: 20px;">Motor Insurance</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 50px;">Select your vehicle type to get the best insurance quotes</p>

        <div class="motor-cards">
        <div class="card" onclick="window.location.href='{{ url_for('bike_form') }}'" style="padding: 1.5rem; text-align: center; cursor: pointer;">
          <i class="fas fa-motorcycle" style="font-size: 3rem; color: var(--indigo-light); margin-bottom: 1rem; position: relative;"></i>
          <h3 style="font-size: 1.2rem; position: relative;">Two Wheeler</h3>
        </div>

        <div class="card" onclick="window.location.href='{{ url_for('car_form') }}'" style="padding: 1.5rem; text-align: center; cursor: pointer;">
          <i class="fas fa-car" style="font-size: 3rem; color: var(--indigo-light); margin-bottom: 1rem; position: relative;"></i>
          <h3 style="font-size: 1.2rem; position: relative;">Private Car</h3>
        </div>

        <div class="card" onclick="window.location.href='{{ url_for('pcv_form') }}'" style="padding: 1.5rem; text-align: center; cursor: pointer;">
          <i class="fas fa-bus" style="font-size: 3rem; color: var(--indigo-light); margin-bottom: 1rem; position: relative;"></i>
          <h3 style="font-size: 1.2rem; position: relative;">Passenger Carrying (PCV)</h3>
        </div>

        <div class="card" onclick="window.location.href='{{ url_for('gcv_form') }}'" style="padding: 1.5rem; text-align: center; cursor: pointer;">
          <i class="fas fa-truck" style="font-size: 3rem; color: var(--indigo-light); margin-bottom: 1rem; position: relative;"></i>
          <h3 style="font-size: 1.2rem; position: relative;">Goods Carrying (GCV)</h3>
        </div>

        <div class="card" onclick="window.location.href='{{ url_for('misc_form') }}'" style="padding: 1.5rem; text-align: center; cursor: pointer;">
          <i class="fas fa-tractor" style="font-size: 3rem; color: var(--indigo-light); margin-bottom: 1rem; position: relative;"></i>
          <h3 style="font-size: 1.2rem; position: relative;">Miscellaneous Vehicles</h3>
        </div>
      </div>
        </div>
    </div>

    {% include 'footer.html' %}

</body>
</html>
